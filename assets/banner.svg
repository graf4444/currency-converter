<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="100%" height="100%">
  <defs>
    <!-- Фон с красивым радиальным градиентом -->
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    
    <!-- Свечение для иконки -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Заливка фона -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>

  <!-- Сетка на бэкграунде для эффекта технологичности -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,80 L 1280,80 M 0,160 L 1280,160 M 0,240 L 1280,240 M 0,320 L 1280,320 M 0,400 L 1280,400 M 0,480 L 1280,480 M 0,560 L 1280,560"/>
    <path d="M 160,0 L 160,640 M 320,0 L 320,640 M 480,0 L 480,640 M 640,0 L 640,640 M 800,0 L 800,640 M 960,0 L 960,640 M 1120,0 L 1120,640"/>
  </g>

  <!-- Главная Иконка (По центру) -->
  <g transform="translate(640, 200)" filter="url(#glow)">
    <circle cx="0" cy="0" r="70" fill="#3b82f6" opacity="0.2"/>
    <circle cx="0" cy="0" r="55" fill="#1d4ed8"/>
    <!-- Символ обмена / валют -->
    <text x="0" y="22" font-family="Segoe UI, Apple Color Emoji, Arial" font-size="65" fill="#ffffff" text-anchor="middle">💱</text>
  </g>

  <!-- Главный заголовок проекта -->
  <text x="640" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-size="46" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    CURRENCY &amp; CRYPTO CONVERTER
  </text>
  
  <!-- Подзаголовок -->
  <text x="640" y="385" font-family="system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Конвертер валют и криптовалют • Open Source &amp; PWA
  </text>

  <!-- Блок с фичами (Теги/Бейджи снизу) -->
  <g transform="translate(640, 480)">
    <!-- Фича 1: 100% Free -->
    <g transform="translate(-360, 0)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#22c55e" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="40" rx="20" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <text x="75" y="26" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#4ade80" text-anchor="middle">100% FREE</text>
    </g>

    <!-- Фича 2: No Ads -->
    <g transform="translate(-180, 0)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#eab308" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="40" rx="20" fill="none" stroke="#eab308" stroke-width="1.5"/>
      <text x="75" y="26" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fde047" text-anchor="middle">NO ADS</text>
    </g>

    <!-- Фича 3: Offline Mode -->
    <g transform="translate(30, 0)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#3b82f6" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="40" rx="20" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="75" y="26" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" text-anchor="middle">OFFLINE MODE</text>
    </g>

    <!-- Фича 4: Privacy Focused -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#a855f7" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="40" rx="20" fill="none" stroke="#a855f7" stroke-width="1.5"/>
      <text x="75" y="26" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#c084fc" text-anchor="middle">PRIVACY FIRST</text>
    </g>
  </g>
</svg>
